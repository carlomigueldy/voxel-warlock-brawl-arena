name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: 'npm ci'

      - name: Quality gates
        run: |
          npm test

# ---------------------------------------------------------------------------
# Project-specific jobs (optional): append your own jobs below.
#
# This template ships only the generic `quality` job. A project that needs
# extra CI — a database test suite, a container image build, e2e, etc. —
# appends its own jobs here. Examples:
#
#   db-tests:
#     name: Database tests
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#       # ... start your DB / apply migrations / run the suite ...
#
#   docker:
