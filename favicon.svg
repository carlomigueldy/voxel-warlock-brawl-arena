<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Voxel Warlock Brawl Arena">
  <defs>
    <!-- Arcane orb radial -->
    <radialGradient id="orbCore" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d0b8ff"/>
      <stop offset="35%" stop-color="#8c68ff"/>
      <stop offset="70%" stop-color="#6c4cff"/>
      <stop offset="100%" stop-color="#3a2090"/>
    </radialGradient>
    <!-- Ember inner spark -->
    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#ffd23c" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer glow -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#6c4cff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6c4cff" stop-opacity="0.5"/>
    </radialGradient>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#16112e"/>
      <stop offset="100%" stop-color="#0a0814"/>
    </radialGradient>
    <!-- Lava flare at bottom -->
    <radialGradient id="lavaFlare" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#ff5a3c" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#ffd23c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square void background -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#bgGrad)"/>

  <!-- Lava glow at base -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#lavaFlare)"/>

  <!-- Outer ring glow halo -->
  <circle cx="32" cy="30" r="22" fill="url(#outerGlow)"/>

  <!-- ── Voxel stack: 3 isometric cubes forming a tower ── -->
  <!-- Bottom cube (ember-tinted) -->
  <g filter="url(#glow)" opacity="0.9">
    <!-- top -->
    <polygon points="32,34 42,39 32,44 22,39" fill="#2a1448" stroke="#ff5a3c" stroke-width="0.7"/>
    <!-- left -->
    <polygon points="22,39 32,44 32,54 22,49" fill="#160a28" stroke="#cc3a20" stroke-width="0.7"/>
    <!-- right -->
    <polygon points="42,39 32,44 32,54 42,49" fill="#120824" stroke="#aa2810" stroke-width="0.7"/>
  </g>

  <!-- Middle cube (arcane-tinted) -->
  <g filter="url(#glow)" opacity="0.95">
    <polygon points="32,22 44,28 32,34 20,28" fill="#1e1448" stroke="#6c4cff" stroke-width="0.8"/>
    <polygon points="20,28 32,34 32,44 20,38" fill="#14103a" stroke="#4a38cc" stroke-width="0.8"/>
    <polygon points="44,28 32,34 32,44 44,38" fill="#100e34" stroke="#3a2aaa" stroke-width="0.8"/>
  </g>

  <!-- Top cube (rune-tinted) -->
  <g filter="url(#glow)" opacity="1">
    <polygon points="32,12 43,17.5 32,23 21,17.5" fill="#1a2010" stroke="#7cff5a" stroke-width="0.9"/>
    <polygon points="21,17.5 32,23 32,33 21,27.5" fill="#101808" stroke="#50cc30" stroke-width="0.9"/>
    <polygon points="43,17.5 32,23 32,33 43,27.5" fill="#0c1406" stroke="#3ca820" stroke-width="0.9"/>
  </g>

  <!-- Central arcane orb floating above tower -->
  <circle cx="32" cy="11" r="8" fill="url(#orbCore)" filter="url(#glowSoft)"/>

  <!-- Orb inner spark -->
  <circle cx="32" cy="10" r="3.5" fill="url(#sparkCore)" opacity="0.9"/>

  <!-- Cardinal rune ticks around orb -->
  <line x1="32" y1="1"  x2="32" y2="4"  stroke="#7cff5a" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="18" x2="32" y2="21" stroke="#7cff5a" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="22" y1="11" x2="25" y2="11" stroke="#7cff5a" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="39" y1="11" x2="42" y2="11" stroke="#7cff5a" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <!-- Orbiting spark dots (6 positions) -->
  <circle cx="32"   cy="2.5" r="1.2" fill="#ffd23c" filter="url(#glow)" opacity="0.95"/>
  <circle cx="40.5" cy="5.5" r="1"   fill="#ff5a3c" filter="url(#glow)" opacity="0.85"/>
  <circle cx="40.5" cy="16.5" r="1"  fill="#ff5a3c" filter="url(#glow)" opacity="0.85"/>
  <circle cx="32"   cy="19.5" r="1.2" fill="#ffd23c" filter="url(#glow)" opacity="0.95"/>
  <circle cx="23.5" cy="16.5" r="1"  fill="#4cc9ff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="23.5" cy="5.5"  r="1"  fill="#4cc9ff" filter="url(#glow)" opacity="0.8"/>

  <!-- Lava crack at base of tower -->
  <line x1="14" y1="55" x2="50" y2="55" stroke="#ff5a3c" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <line x1="20" y1="58" x2="44" y2="58" stroke="#ffd23c" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Border rim (subtle arcane edge) -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="11.5" ry="11.5" fill="none" stroke="#6c4cff" stroke-width="1" opacity="0.4"/>
</svg>
